<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ClinVar Cancer Detection{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/geist" rel="stylesheet">
    <style>
        :root {
            --accent: #22c55e;
            --accent-dim: rgba(34, 197, 94, 0.15);
            --radius: 10px;
            --radius-sm: 6px;
            --nav-height: 64px;
        }
        * { font-family: 'Geist', system-ui, -apple-system, sans-serif; }
        body { padding-top: 0; }
        .navbar { height: var(--nav-height); }
        .nav-menu { position: relative; }
        .nav-menu-btn { background: none; border: none; padding: 4px; cursor: pointer; }
        .nav-menu-dropdown { display: none; position: absolute; top: calc(100% + 14px); right: -4px; z-index: 1050; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 6px; min-width: 200px; box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
        [data-bs-theme="light"] .nav-menu-dropdown { background: #fff; border-color: rgba(0,0,0,0.1); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
        .nav-menu-dropdown.open { display: block; }
        .nav-menu-item { display: block; padding: 0.5rem 0.75rem; font-size: 0.875rem; color: rgba(255,255,255,0.7); text-decoration: none; border-radius: var(--radius-sm); transition: all 0.1s; white-space: nowrap; }
        .nav-menu-item:hover { background: rgba(34,197,94,0.15); color: var(--accent); }
        .nav-menu-item.active { color: var(--accent); font-weight: 600; background: rgba(34,197,94,0.1); }
        [data-bs-theme="light"] .nav-menu-item { color: rgba(0,0,0,0.6); }
        [data-bs-theme="light"] .nav-menu-item:hover { background: rgba(34,197,94,0.1); color: var(--accent); }
        [data-bs-theme="light"] .nav-menu-item.active { background: rgba(34,197,94,0.08); }
        .card { border-radius: var(--radius); border-color: rgba(255,255,255,0.08); }
        .card-header { border-radius: var(--radius) var(--radius) 0 0 !important; }
        .btn { border-radius: var(--radius-sm); font-size: 0.875rem; transition: all 0.15s ease; }
        .btn:active { transform: scale(0.97); }
        .btn-outline-success { --bs-btn-color: var(--accent); --bs-btn-border-color: var(--accent); --bs-btn-hover-bg: var(--accent); --bs-btn-hover-border-color: var(--accent); }
        .badge { font-weight: 500; letter-spacing: -0.01em; }
        pre, code, .card pre { font-family: 'Geist Mono', monospace !important; font-size: 0.8rem; }
        .form-control, .form-select { border-radius: var(--radius-sm); }
        .table { font-size: 0.875rem; }
        .table th { font-weight: 500; letter-spacing: -0.01em; color: rgba(255,255,255,0.5); text-transform: uppercase; font-size: 0.7rem; }
        .progress { border-radius: 999px; height: 6px !important; }
        .progress-bar { border-radius: 999px; }
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        [data-bs-theme="light"] .skeleton { background: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 75%); background-size: 200% 100%; }
        .log-pre { background: rgba(255,255,255,0.04); max-height: 300px; min-height: 150px; height: 30vh; overflow-y: auto; font-size: 0.85rem; }
        [data-bs-theme="light"] .log-pre { background: #f0f0f0 !important; color: #111 !important; }
        #theme-toggle { cursor: pointer; border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 4px 10px; font-size: 0.85rem; line-height: 1; background: transparent; color: rgba(255,255,255,0.5); transition: all 0.2s; width: 36px; height: 32px; display: flex; align-items: center; justify-content: center; }
        #theme-toggle:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.9); }
        [data-bs-theme="light"] #theme-toggle { border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.5); }
        [data-bs-theme="light"] #theme-toggle:hover { border-color: rgba(0,0,0,0.3); color: rgba(0,0,0,0.9); }
        [data-bs-theme="light"] body { background: #fff; color: #111; }
        [data-bs-theme="light"] .card { border-color: rgba(0,0,0,0.08); }
        [data-bs-theme="light"] .table { --bs-table-bg: transparent; --bs-table-color: #111; }
        [data-bs-theme="light"] .table th { color: rgba(0,0,0,0.5) !important; }
        pre { background: rgba(255,255,255,0.04); padding: 0.75rem; border-radius: var(--radius-sm); }
        [data-bs-theme="light"] pre { background: #f5f5f5 !important; color: #111 !important; }
        [data-bs-theme="light"] .text-secondary { color: rgba(0,0,0,0.5) !important; }
        [data-bs-theme="light"] .navbar { background: #fff !important; border-color: rgba(0,0,0,0.08) !important; }
        [data-bs-theme="light"] .navbar .navbar-brand, [data-bs-theme="light"] .navbar .navbar-brand:hover { color: #111 !important; }
        [data-bs-theme="light"] .navbar .navbar-toggler-icon { filter: invert(1); }
        [data-bs-theme="light"] footer { border-top-color: rgba(0,0,0,0.08) !important; }
        .chart-img-bg { background: #1a1a1a; }
        [data-bs-theme="light"] .chart-img-bg { background: #f8f8f8; }
        .table { --bs-table-bg: transparent; }

        .custom-select { position: relative; }
        .custom-select-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: var(--bs-body-color); border-radius: var(--radius-sm); padding: 0.25rem 0.5rem; font-size: 0.875rem; text-align: left; display: flex; align-items: center; justify-content: space-between; width: 100%; cursor: pointer; transition: background 0.15s; }
        .custom-select-btn:hover { background: rgba(255,255,255,0.08); }
        [data-bs-theme="light"] .custom-select-btn { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.1); }
        [data-bs-theme="light"] .custom-select-btn:hover { background: rgba(0,0,0,0.04); }
        .custom-select-btn .arrow { font-size: 0.55rem; opacity: 0.5; transition: transform 0.2s; }
        .custom-select-btn.open .arrow { transform: rotate(180deg); }
        .custom-select-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 1000; background: #1e1e1e; border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); padding: 4px; margin-top: 2px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); max-height: 220px; overflow-y: auto; }
        [data-bs-theme="light"] .custom-select-menu { background: #fff; border-color: rgba(0,0,0,0.1); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .custom-select-menu.open { display: block; }
        .custom-select-item { display: block; width: 100%; padding: 0.3rem 0.6rem; font-size: 0.85rem; color: var(--bs-body-color); background: none; border: none; border-radius: 4px; text-align: left; cursor: pointer; transition: background 0.1s; }
        .custom-select-item:hover { background: rgba(34,197,94,0.15); color: var(--accent); }
        .custom-select-item.active { background: var(--accent); color: #fff; }
        .custom-select-item.active:hover { background: #1da14e; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-black border-bottom mb-4" style="border-color: rgba(255,255,255,0.06);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/" style="letter-spacing: -0.03em; font-size: 1rem;">ClinVar Cancer Detection</a>
            <div class="d-flex align-items-center gap-2">
                <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
                <div class="nav-menu">
                    <button class="nav-menu-btn navbar-toggler" type="button" onclick="toggleNavMenu(this)" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="nav-menu-dropdown">
                        <a class="nav-menu-item {% if request.path == '/' %}active{% endif %}" href="/" {% if request.path == '/' %}aria-current="page"{% endif %}>Home</a>
                        <a class="nav-menu-item {% if request.path.startswith('/train') %}active{% endif %}" href="/train" {% if request.path.startswith('/train') %}aria-current="page"{% endif %}>Training</a>
                        <a class="nav-menu-item {% if request.path.startswith('/detect') %}active{% endif %}" href="/detect" {% if request.path.startswith('/detect') %}aria-current="page"{% endif %}>Detection</a>
                        <a class="nav-menu-item {% if request.path == '/models' %}active{% endif %}" href="/models" {% if request.path == '/models' %}aria-current="page"{% endif %}>Models</a>
                        <a class="nav-menu-item {% if request.path == '/charts/gallery' %}active{% endif %}" href="/charts/gallery" {% if request.path == '/charts/gallery' %}aria-current="page"{% endif %}>Charts</a>
                        <a class="nav-menu-item {% if request.path == '/api/docs' %}active{% endif %}" href="/api/docs" {% if request.path == '/api/docs' %}aria-current="page"{% endif %}>API</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-secondary mt-5 py-3 border-top" style="border-color: rgba(255,255,255,0.06);">
        <small>ClinVar Cancer Detection System - PyTorch + Flask</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('theme-toggle');
        const current = html.getAttribute('data-bs-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-bs-theme', next);
        btn.innerHTML = next === 'dark' ? '&#9790;' : '&#9788;';
        localStorage.setItem('theme', next);
    }
    const saved = localStorage.getItem('theme');
    if (saved && saved !== document.documentElement.getAttribute('data-bs-theme')) toggleTheme();

    function toggleNavMenu(btn) {
        const menu = btn.parentElement.querySelector('.nav-menu-dropdown');
        const isOpen = menu.classList.contains('open');
        document.querySelectorAll('.nav-menu-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
        if (!isOpen) menu.classList.add('open');
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.nav-menu')) {
            document.querySelectorAll('.nav-menu-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
        }
    });

    function toggleCustomSelect(btn) {
        const menu = btn.parentElement.querySelector('.custom-select-menu');
        document.querySelectorAll('.custom-select-menu.open').forEach(function(m) {
            if (m !== menu) m.classList.remove('open');
        });
        document.querySelectorAll('.custom-select-btn.open').forEach(function(b) {
            if (b !== btn) b.classList.remove('open');
        });
        menu.classList.toggle('open');
        btn.classList.toggle('open');
    }

    function selectCustomOption(item) {
        const container = item.closest('.custom-select');
        const btn = container.querySelector('.custom-select-btn');
        const menu = container.querySelector('.custom-select-menu');
        const hidden = container.querySelector('input[type="hidden"]');
        const label = container.querySelector('.custom-select-label');
        hidden.value = item.dataset.value;
        label.textContent = item.textContent.trim();
        menu.querySelectorAll('.custom-select-item').forEach(function(i) { i.classList.remove('active'); });
        item.classList.add('active');
        menu.classList.remove('open');
        btn.classList.remove('open');
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.custom-select')) {
            document.querySelectorAll('.custom-select-menu.open').forEach(function(m) { m.classList.remove('open'); });
            document.querySelectorAll('.custom-select-btn.open').forEach(function(b) { b.classList.remove('open'); });
        }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
